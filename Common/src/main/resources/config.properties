base.url=https://automationexercise.com

#UI Configuration
browser=chrome
title=mr
day=10
month=5
year=2007
country=India
state=Andhra pradesh
city=Tadepalligudem

# API Configuration
api.timeout=10000
api.retry.count=3

# API Headers and Content Types
api.header.accept=application/json
api.header.content.type.json=application/json
api.header.content.type.form=application/x-www-form-urlencoded
api.header.content.type.text=text/plain

# User Test Data
test.user.name=John Doe
test.user.email=john.doe@test.com
test.user.password=Test123
test.user.title=Mr
test.user.birth_date=15
test.user.birth_month=January
test.user.birth_year=1990
test.user.firstname=John
test.user.lastname=Doe
test.user.company=Tech Inc
test.user.address1=123 Main St
test.user.address2=Apt 4B
test.user.country=USA
test.user.zipcode=10001
test.user.state=NY
test.user.city=New York
test.user.mobile_number=1234567890

# Updated User Data
test.user.updated.name=John Smith
test.user.updated.firstname=John
test.user.updated.lastname=Smith
test.user.updated.company=Tech Corp
test.user.updated.address1=456 Oak Ave
test.user.updated.address2=Suite 10
test.user.updated.zipcode=20002
test.user.updated.state=CA
test.user.updated.city=Los Angeles
test.user.updated.mobile_number=0987654321

# Invalid Test Data
test.user.invalid.email=invalid-email

# Product Search Data
test.product.search.term=top
test.product.search.invalid.term=nonexistentproduct123
test.product.search.terms=top,tshirt,jean
test.product.search.random.terms=top,tshirt,jean,dress,shirt,pants

# User Update Data
test.user.update.name=John Updated
test.user.update.phone=9876543210

# Existing Email for Negative Testing
test.user.existing.email=john.doe@test.com

# Email Domain for Unique Email Generation
test.user.email.domain=test.com

# Default Values for Random Users
test.user.default.title=Mr
test.user.default.birth_date=15
test.user.default.birth_month=January
test.user.default.birth_year=1990
test.user.default.country=USA
test.user.default.address.prefix=Apt

# API Endpoints
api.endpoint.products.list=/api/productsList
api.endpoint.product.search=/api/searchProduct
api.endpoint.user.create=/api/createAccount
api.endpoint.user.update=/api/updateAccount
api.endpoint.user.delete=/api/deleteAccount

# API Response Messages
api.response.message.user.created=User created!
api.response.message.user.updated=User updated!
api.response.message.user.deleted=Account deleted!
api.response.message.user.not.found=Account not found!
api.response.message.email.exists=Email already exists!
